<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd Checker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;  
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px gray;
            width: 300px;
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Even and Odd Checker</h2>

    <input type="number" id="num" placeholder="Enter a number">

    <br>

    <button onclick="checkNumber()">Check</button>

    <h3 id="result"></h3>
</div>

<script>
    function checkNumber() {
        let number = document.getElementById("num").value;

        if (number % 2 == 0) {
            document.getElementById("result").innerHTML =
                number + " is an Even Number";
        } else {
            document.getElementById("result").innerHTML =
                number + " is an Odd Number";
        }
    }
</script>

</body>
</html>
